<div class="grid gap-4">
  @if (course(); as course) {
    <div class="grid gap-2">
      <div class="flex flex-wrap items-center gap-2">
        <h1 class="text-2xl font-semibold">{{ course.title }}</h1>
        <button
          mat-icon-button
          type="button"
          (click)="toggleFavorite(course.id, course.title)"
          [attr.aria-label]="library.isFavorite(course.id) ? 'Remove from favorites' : 'Add to favorites'"
        >
          <mat-icon
            [class.sb-icon-filled]="library.isFavorite(course.id)"
            [color]="library.isFavorite(course.id) ? 'primary' : undefined"
          >
            star
          </mat-icon>
        </button>
      </div>
      <div class="text-sm opacity-80">{{ course.subject }} • {{ course.level }}</div>
      <p class="text-sm opacity-80">{{ course.description }}</p>
    </div>

    <mat-card>
      <mat-card-header>
        <mat-card-title>Lessons</mat-card-title>
        <mat-card-subtitle>Pick a lesson to start</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <mat-nav-list>
          @for (lesson of lessons(); track lesson.id) {
            <a mat-list-item [routerLink]="['/player', lesson.id]">
              <span matListItemTitle>{{ lesson.title }}</span>
              <span matListItemLine class="text-xs opacity-70">
                Duration: {{ lesson.durationSeconds }}s
              </span>
            </a>
          }
        </mat-nav-list>
      </mat-card-content>

      <mat-divider />

      <mat-card-actions align="end">
        <a mat-button routerLink="/courses">Back to catalog</a>
      </mat-card-actions>
    </mat-card>
  } @else {
    <mat-card>
      <mat-card-content>Loading course…</mat-card-content>
    </mat-card>
  }
</div>
